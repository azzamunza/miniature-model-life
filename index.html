<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Builder</title>
<style>
 body {
 font-family: Arial, sans-serif;
 margin: 20px;
 background: #f5f5f5;
 }

 h2 {
 margin-top: 30px;
 }

 .field {
 background: #fff;
 padding: 10px;
 margin-bottom: 10px;
 border-radius: 6px;
 }

 textarea {
 width: 100%;
 min-height: 60px;
 resize: vertical;
 }

 input, select, button {
 margin-top: 5px;
 }

 .row {
 display: flex;
 gap: 10px;
 flex-wrap: wrap;
 }

 .output {
 white-space: pre-wrap;
 background: #222;
 color: #0f0;
 padding: 15px;
 border-radius: 6px;
 }
</style>
</head>
<body>

<h1>Prompt Builder</h1>

<div id="fields"></div>

<h2>Final Prompt</h2>
<div class="output" id="output"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- Configuration ---
const SUPABASE_URL = "https://nrwckhyegdkcbfbiitxz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yd2NraHllZ2RrY2JmYmlpdHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYxMzcsImV4cCI6MjA4NzcxMjEzN30.j_4uCVEG2CoNv9n8tGJaPwZNqSuEqZUZUxxVLdGZcEo";
const GITHUB_OWNER = "azzamunza";
const GITHUB_REPO = "miniature-model-life";
const GITHUB_FILE_PATH = "presets.json";

// Initialize Supabase
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
 auth: { flowType: 'pkce', detectSessionInUrl: true, persistSession: true }
});

// --- Auth UI Elements ---
const authContainer = document.createElement("div");
authContainer.className = "field";
authContainer.innerHTML = `
 <h3>Authentication & GitHub</h3>
 <div id="login-section">
   <button id="login-btn" style="background:#4285F4; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer;">Sign in with Google</button>
 </div>
 <div id="user-section" style="display:none; align-items:center; gap:10px;">
   <span id="user-email"></span>
   <button id="logout-btn">Log out</button>
   <div style="margin-top: 10px;">
     <input type="password" id="gh-pat" placeholder="GitHub PAT (ghp_...)" title="Required to push changes to GitHub" style="width:250px;">
     <button id="save-pat-btn">Save PAT</button>
   </div>
 </div>
`;
document.body.insertBefore(authContainer, document.getElementById("fields"));

// --- GitHub API Helper ---
const githubAPI = {
  _token() { return localStorage.getItem('gh_pat') || ''; },
  async getFile() {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`, {
      headers: { 'Authorization': `Bearer ${this._token()}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) {
        if (res.status === 404) return { content: "{}", sha: null };
        throw new Error("Failed to fetch from GitHub");
    }
    const data = await res.json();
    return { 
        content: decodeURIComponent(escape(atob(data.content))), 
        sha: data.sha 
    };
  },
  async putFile(contentStr, sha) {
    if (!this._token()) {
        alert("Please enter your GitHub Personal Access Token (PAT) first to save online.");
        return false;
    }
    const body = {
      message: "Update presets.json",
      content: btoa(unescape(encodeURIComponent(contentStr)))
    };
    if (sha) body.sha = sha;
    
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`, {
      method: 'PUT',
      headers: { 
        'Authorization': `Bearer ${this._token()}`, 
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error("Failed to push to GitHub");
    return true;
  }
};

// --- Auth Logic ---
let fileSha = null;

async function checkUser() {
  // Exchange code if returning from redirect
  const params = new URLSearchParams(location.search);
  if (params.get('code')) {
    const { error } = await supabase.auth.exchangeCodeForSession(params.get('code'));
    if (!error) history.replaceState({}, document.title, location.pathname);
  }

  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("user-section").style.display = "flex";
    document.getElementById("user-section").style.flexWrap = "wrap";
    document.getElementById("user-email").textContent = session.user.email;
    document.getElementById("gh-pat").value = localStorage.getItem('gh_pat') || '';
    
    // Attempt to load presets from GitHub
    if (localStorage.getItem('gh_pat')) {
      try {
        const { content, sha } = await githubAPI.getFile();
        if (content) {
          localStorage.setItem("promptData", content); // sync to local
          fileSha = sha;
          // Refresh fields if they are already rendered
          document.querySelectorAll('.field select').forEach(s => s.dispatchEvent(new Event('refresh')));
        }
      } catch (e) {
        console.error("Error loading GitHub presets:", e);
      }
    }
  } else {
    document.getElementById("login-section").style.display = "block";
    document.getElementById("user-section").style.display = "none";
  }
}

document.getElementById("login-btn").onclick = async () => {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
};

document.getElementById("logout-btn").onclick = async () => {
  await supabase.auth.signOut();
  checkUser();
};

document.getElementById("save-pat-btn").onclick = () => {
  const pat = document.getElementById("gh-pat").value;
  if (pat) {
    localStorage.setItem('gh_pat', pat);
    alert("GitHub PAT saved securely in your browser's local storage.");
    checkUser(); // Reload data with new PAT
  }
};

supabase.auth.onAuthStateChange(() => checkUser());
checkUser();

const variables = [
"giant_person_description",
"location_name",
"location_style",
"water_type",
"water_motion",
"shore_type",
"key_landmarks",
"vegetation",
"miniature_structures",
"small_details",
"underwater_feature",
"hand_action",
"tiny_object",
"interaction_verb",
"interaction_surface",
"ripple_effect",
"secondary_motion",
"lighting_type",
"time_of_day",
"camera_style",
"lens_effect",
"camera_movement",
"aspect_ratio",
"visual_style",
"detail_level",
"mood"
];

const template = `A photorealistic vertical video of {giant_person_description} leaning over a large tabletop miniature diorama of {location_name}, {location_style}. The diorama features {water_type} with realistic {water_motion}, {shore_type}, {key_landmarks}, {vegetation}, and {miniature_structures}. {small_details} are scattered throughout. {underwater_feature}.

The person's {hand_action} {tiny_object} {interaction_verb} the {interaction_surface}, creating {ripple_effect}. {secondary_motion}.

Lighting: {lighting_type}, {time_of_day}, natural shadows. Camera: {camera_style}, {lens_effect}, slow {camera_movement}, {aspect_ratio}. Style: {visual_style}, {detail_level}, {mood} mood.`;

// Load saved data
function loadData() {
 return JSON.parse(localStorage.getItem("promptData") || "{}");
}

async function saveData(data) {
 const dataStr = JSON.stringify(data, null, 2);
 localStorage.setItem("promptData", dataStr);
 
 // If user is logged in and has a PAT, push to GitHub
 if (localStorage.getItem('gh_pat')) {
   try {
     const success = await githubAPI.putFile(dataStr, fileSha);
     if (success) {
       // Refresh SHA for next save
       const updated = await githubAPI.getFile();
       fileSha = updated.sha;
     }
   } catch (e) {
     alert("Error saving to GitHub: " + e.message);
   }
 }
}

function createField(name) {
 const container = document.createElement("div");
 container.className = "field";

 const title = document.createElement("h3");
 title.textContent = name;

 const textarea = document.createElement("textarea");

 const saveName = document.createElement("input");
 saveName.placeholder = "Preset name";

 const dropdown = document.createElement("select");

 const saveBtn = document.createElement("button");
 saveBtn.textContent = "Save";

 // Populate dropdown
 function refreshDropdown() {
 dropdown.innerHTML = "";
 const data = loadData();
 if (data[name]) {
 Object.keys(data[name]).forEach(key => {
 const opt = document.createElement("option");
 opt.value = key;
 opt.textContent = key;
 dropdown.appendChild(opt);
 });
 }
 }

 // Save preset
 saveBtn.onclick = () => {
 if (!saveName.value) return alert("Enter preset name");

 const data = loadData();
 if (!data[name]) data[name] = {};

 data[name][saveName.value] = textarea.value;
 saveData(data);
 refreshDropdown();
 };

 // Load preset
 dropdown.onchange = () => {
 const data = loadData();
 textarea.value = data[name][dropdown.value];
 updateOutput();
 };

 textarea.oninput = updateOutput;

 dropdown.addEventListener('refresh', refreshDropdown);
 refreshDropdown();

 container.appendChild(title);
 container.appendChild(textarea);
 container.appendChild(saveName);
 container.appendChild(saveBtn);
 container.appendChild(dropdown);

 return container;
}

// Build UI
const fieldsDiv = document.getElementById("fields");
variables.forEach(v => {
 fieldsDiv.appendChild(createField(v));
});

// Generate output
function updateOutput() {
 let result = template;

 variables.forEach(v => {
 const field = [...document.querySelectorAll(".field")]
 .find(f => f.querySelector("h3").textContent === v);

 const value = field.querySelector("textarea").value || `{${v}}`;
 result = result.replaceAll(`{${v}}`, value);
 });

 document.getElementById("output").textContent = result;
}

updateOutput();
</script>

</body>
</html>
